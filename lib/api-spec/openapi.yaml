        whatSupports:
          type: array
          items:
            type: string
        whatArguesAgainst:
          type: array
          items:
            type: string
        whatConfirms:
          type: array
          items:
            type: string
        whatInvalidates:
          type: array
          items:
            type: string
        positionGuidance:
          type: array
          items:
            type: string
        riskNotes:
          type: array
          items:
            type: string

