    CopilotEvent:
      type: object
      description: Canonical deterministic copilot event. Source of truth for the analyst layer; never carries order intent.
      required:
        - eventId
        - symbol
        - timestamp
        - mode
        - dataSource
        - alertLevel
        - l5Blocked
        - snapshot
        - marketQuality
        - triggers
        - triggerStack
        - gates
        - hardBlocks
        - riskReward
        - position
        - feedQuality
        - warnings
        - bars
      properties:
        eventId:
          type: string
        symbol:
          type: string
        timestamp:
          type: string
          description: ISO 8601 event timestamp
        mode:
          type: string
          enum: [LIVE, REPLAY, RESEARCH]
          description: "LIVE | REPLAY | RESEARCH"
        dataSource:
          type: string
          description: "Origin of the underlying bars/quotes (e.g. fixture, yahoo_delayed)"
        alertLevel:
          type: ["string", "null"]
          enum: ["L1", "L2", "L3", "L4", "L5", null]
          description: "Deterministic alert ladder level L1..L5, or null"
        l5Blocked:
          type: boolean
          description: "True when a hard L5 safety block is active"
        snapshot:
          $ref: "#/components/schemas/MarketSnapshot"
        marketQuality:
          $ref: "#/components/schemas/MarketQuality"
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/CopilotTrigger"
        triggerStack:
          $ref: "#/components/schemas/TriggerStack"
        gates:
          $ref: "#/components/schemas/GateVerdicts"
        hardBlocks:
          type: array
          description: "Non-overridable L5 hard-block codes; empty when not blocked"
          items:
            type: string
        riskReward:
          $ref: "#/components/schemas/RiskReward"
        position:
          $ref: "#/components/schemas/PositionRead"
        feedQuality:
          $ref: "#/components/schemas/FeedQuality"
        warnings:
          type: array
          items:
            type: string
        bars:
          type: array
          description: "OHLCV bars underlying this event, oldest first; empty on data failure."
          items:
            $ref: "#/components/schemas/CopilotBar"

    AgentRead:
      type: object
      description: One specialist analyst's read. Explanatory only; never an instruction to transact.
      required:
        - agent
        - status
        - bias
        - confidence
        - headline
        - supportingFactors
        - warnings
        - riskVerdict
        - maxRecommendation
      properties:
        agent:
          type: string
          enum:
            - technical
            - pattern
            - regime
            - order_flow
            - catalyst
            - position
            - memory
            - bull_case
            - bear_case
            - risk_critic
        status:
          type: string
          enum: [OK, DEGRADED, UNAVAILABLE]
        bias:
          type: string
          enum: [BULLISH, BEARISH, NEUTRAL, MIXED, UNKNOWN]
        confidence:
          type: number
          description: "Clamped to [0,1]"
        headline:
          type: string
        supportingFactors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        riskVerdict:
          type: ["string", "null"]
          enum: [PASS, WARN, BLOCK, null]
          description: "Risk critic verdict; null for every other agent"
        maxRecommendation:
          type: ["string", "null"]
          enum:
            - WATCH
            - WAIT
            - AVOID
            - POSSIBLE_LONG_ZONE
            - POSSIBLE_SHORT_ZONE
            - THESIS_VALID
            - THESIS_WEAKENING
            - TRAIL_STOP
            - TAKE_PARTIALS
            - EXIT_WARNING
            - THESIS_INVALIDATED
            - DO_NOT_ADD
            - null
          description: "Risk critic recommendation ceiling; null for every other agent"

