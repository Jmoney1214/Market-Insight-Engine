openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinDesk AI Analyst API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Ticker analysis and reports
  - name: watchlist
    description: Watchlist management
  - name: copilot
    description: Trading Desk Copilot research helper (no order execution)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyze:
    post:
      operationId: analyzeTicker
      tags: [analysis]
      summary: Run AI analysis on a ticker
      description: Triggers a full analyst report for the given ticker using live market data and AI-generated analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Invalid ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /reports:
    get:
      operationId: listReports
      tags: [analysis]
      summary: List past analyses
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummary"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [analysis]
      summary: Get a specific report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteReport
      tags: [analysis]
      summary: Delete a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get watchlist tickers
      responses:
        "200":
          description: Watchlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistEntry"
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add ticker to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntry"

  /watchlist/{ticker}:
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove ticker from watchlist
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /copilot/healthz:
    get:
      operationId: copilotHealthCheck
      tags: [copilot]
      summary: Copilot service health check
      description: Returns health status for the Trading Desk Copilot service
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotHealth"

  /copilot/journal:
    get:
      operationId: listJournalEntries
      tags: [copilot]
      summary: List journal entries
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [copilot]
      summary: Create a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/journal/{id}:
    delete:
      operationId: deleteJournalEntry
      tags: [copilot]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /copilot/strategies:
    get:
      operationId: listStrategies
      tags: [copilot]
      summary: List strategy registry entries
      responses:
        "200":
          description: Strategy registry entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyRegistryEntry"

  /copilot/validation:
    get:
      operationId: listValidationStates
      tags: [copilot]
      summary: List strategy validation states
      responses:
        "200":
          description: Validation states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationState"

  /copilot/history:
    get:
      operationId: listHistoryEvents
      tags: [copilot]
      summary: List historical copilot events
      responses:
        "200":
          description: History events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEvent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnalyzeInput:
      type: object
      required: [ticker]
      properties:
        ticker:
          type: string
          description: Stock ticker symbol (e.g. AAPL, NVDA)

    ReportSummary:
      type: object
      required: [id, ticker, companyName, sector, generatedAt, overallRating]
      properties:
        id:
          type: integer
        ticker:
          type: string
        companyName:
          type: string
        sector:
          type: string
        generatedAt:
          type: string
        overallRating:
          type: string
          description: "BUY | HOLD | SELL | WATCH"

    Report:
      type: object
      required: [id, ticker, companyName, sector, industry, generatedAt, snapshot, catalysts, news, filings, financials, valuation, technical, risks, thesis, actionPlan, overallRating, disclaimer]
      properties:
        id:
          type: integer
        ticker:
          type: string
        companyName:
          type: string
        sector:
          type: string
        industry:
          type: string
        generatedAt:
          type: string
        overallRating:
          type: string
          description: "BUY | HOLD | SELL | WATCH"
        disclaimer:
          type: string
        snapshot:
          $ref: "#/components/schemas/CompanySnapshot"
        catalysts:
          $ref: "#/components/schemas/CatalystSummary"
        news:
          $ref: "#/components/schemas/NewsSummary"
        filings:
          $ref: "#/components/schemas/FilingsSummary"
        financials:
          $ref: "#/components/schemas/FinancialOverview"
        valuation:
          $ref: "#/components/schemas/ValuationFramework"
        technical:
          $ref: "#/components/schemas/TechnicalTrend"
        risks:
          $ref: "#/components/schemas/RiskChecklist"
        thesis:
          $ref: "#/components/schemas/Thesis"
        actionPlan:
          $ref: "#/components/schemas/ActionPlan"

    CompanySnapshot:
      type: object
      required: [description, marketCap, price, change1d, change52w, peRatio, eps, revenue, employees, headquarters, founded, exchange]
      properties:
        description:
          type: string
        marketCap:
          type: string
        price:
          type: number
        change1d:
          type: number
        change52w:
          type: number
        peRatio:
          type: ["number", "null"]
        eps:
          type: ["number", "null"]
        revenue:
          type: string
        employees:
          type: string
        headquarters:
          type: string
        founded:
          type: string
        exchange:
          type: string

    CatalystSummary:
      type: object
      required: [positive, negative, upcoming]
      properties:
        positive:
          type: array
          items:
            type: string
        negative:
          type: array
          items:
            type: string
        upcoming:
          type: array
          items:
            type: string

    NewsSummary:
      type: object
      required: [isPlaceholder, headlines, sentiment]
      properties:
        isPlaceholder:
          type: boolean
        sentiment:
          type: string
          description: "Bullish | Neutral | Bearish"
        headlines:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"

    NewsItem:
      type: object
      required: [title, source, date, sentiment]
      properties:
        title:
          type: string
        source:
          type: string
        date:
          type: string
        sentiment:
          type: string

    FilingsSummary:
      type: object
      required: [isPlaceholder, lastForm10K, lastForm10Q, keyHighlights]
      properties:
        isPlaceholder:
          type: boolean
        lastForm10K:
          type: string
        lastForm10Q:
          type: string
        keyHighlights:
          type: array
          items:
            type: string

    FinancialOverview:
      type: object
      required: [isPlaceholder, revenueGrowthYoY, grossMargin, operatingMargin, netMargin, debtToEquity, currentRatio, freeCashFlow, revenueHistory]
      properties:
        isPlaceholder:
          type: boolean
        revenueGrowthYoY:
          type: ["number", "null"]
        grossMargin:
          type: ["number", "null"]
        operatingMargin:
          type: ["number", "null"]
        netMargin:
          type: ["number", "null"]
        debtToEquity:
          type: ["number", "null"]
        currentRatio:
          type: ["number", "null"]
        freeCashFlow:
          type: string
        revenueHistory:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDataPoint"

    RevenueDataPoint:
      type: object
      required: [period, revenue]
      properties:
        period:
          type: string
        revenue:
          type: number

    ValuationFramework:
      type: object
      required: [isPlaceholder, currentPrice, intrinsicValueLow, intrinsicValueHigh, peComparison, evEbitda, priceToBook, priceToSales, dcfNotes, comparables]
      properties:
        isPlaceholder:
          type: boolean
        currentPrice:
          type: number
        intrinsicValueLow:
          type: number
        intrinsicValueHigh:
          type: number
        peComparison:
          type: string
        evEbitda:
          type: ["number", "null"]
        priceToBook:
          type: ["number", "null"]
        priceToSales:
          type: ["number", "null"]
        dcfNotes:
          type: string
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/Comparable"

    Comparable:
      type: object
      required: [ticker, pe, evEbitda]
      properties:
        ticker:
          type: string
        pe:
          type: ["number", "null"]
        evEbitda:
          type: ["number", "null"]

    TechnicalTrend:
      type: object
      required: [isPlaceholder, trend, rsi, macd, supportLevel, resistanceLevel, ma50, ma200, goldenCross, notes]
      properties:
        isPlaceholder:
          type: boolean
        trend:
          type: string
          description: "Bullish | Bearish | Neutral | Mixed"
        rsi:
          type: ["number", "null"]
        macd:
          type: string
        supportLevel:
          type: ["number", "null"]
        resistanceLevel:
          type: ["number", "null"]
        ma50:
          type: ["number", "null"]
        ma200:
          type: ["number", "null"]
        goldenCross:
          type: ["boolean", "null"]
        notes:
          type: string

    RiskChecklist:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RiskItem"

    RiskItem:
      type: object
      required: [category, description, severity]
      properties:
        category:
          type: string
        description:
          type: string
        severity:
          type: string
          description: "High | Medium | Low"

    Thesis:
      type: object
      required: [bull, base, bear]
      properties:
        bull:
          $ref: "#/components/schemas/ThesisCase"
        base:
          $ref: "#/components/schemas/ThesisCase"
        bear:
          $ref: "#/components/schemas/ThesisCase"

    ThesisCase:
      type: object
      required: [targetPrice, probability, summary, points]
      properties:
        targetPrice:
          type: number
        probability:
          type: integer
          description: Percentage probability (0-100)
        summary:
          type: string
        points:
          type: array
          items:
            type: string

    ActionPlan:
      type: object
      required: [rating, rationale, positionSizing, entryZone, stopLoss, profitTarget, timeHorizon, keyMonitors, disclaimer]
      properties:
        rating:
          type: string
          description: "BUY | HOLD | SELL | WATCH"
        rationale:
          type: string
        positionSizing:
          type: string
        entryZone:
          type: string
        stopLoss:
          type: string
        profitTarget:
          type: string
        timeHorizon:
          type: string
        keyMonitors:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    WatchlistEntry:
      type: object
      required: [id, ticker, addedAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        addedAt:
          type: string
        notes:
          type: ["string", "null"]

    WatchlistInput:
      type: object
      required: [ticker]
      properties:
        ticker:
          type: string
        notes:
          type: string

    CopilotHealth:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string

    CopilotEvent:
      type: object
      description: Canonical deterministic copilot event. Source of truth for the analyst layer; never carries order intent.
      required:
        - eventId
        - symbol
        - timestamp
        - mode
        - dataSource
        - alertLevel
        - l5Blocked
        - snapshot
        - marketQuality
        - triggers
        - warnings
      properties:
        eventId:
          type: string
        symbol:
          type: string
        timestamp:
          type: string
          description: ISO 8601 event timestamp
        mode:
          type: string
          enum: [LIVE, REPLAY, RESEARCH]
          description: "LIVE | REPLAY | RESEARCH"
        dataSource:
          type: string
          description: "Origin of the underlying bars/quotes (e.g. fixture, yahoo_delayed)"
        alertLevel:
          type: ["string", "null"]
          enum: ["L1", "L2", "L3", "L4", "L5", null]
          description: "Deterministic alert ladder level L1..L5, or null"
        l5Blocked:
          type: boolean
          description: "True when a hard L5 safety block is active"
        snapshot:
          $ref: "#/components/schemas/MarketSnapshot"
        marketQuality:
          $ref: "#/components/schemas/MarketQuality"
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/CopilotTrigger"
        warnings:
          type: array
          items:
            type: string

    MarketSnapshot:
      type: object
      required:
        - price
        - vwap
        - rvol
        - atr
        - openingRangeHigh
        - openingRangeLow
        - volumeExpansion
        - priceLocation
        - spread
        - change1d
      properties:
        price:
          type: ["number", "null"]
        vwap:
          type: ["number", "null"]
        rvol:
          type: ["number", "null"]
        atr:
          type: ["number", "null"]
        openingRangeHigh:
          type: ["number", "null"]
        openingRangeLow:
          type: ["number", "null"]
        volumeExpansion:
          type: ["boolean", "null"]
        priceLocation:
          type: ["string", "null"]
        spread:
          type: ["number", "null"]
        change1d:
          type: ["number", "null"]

    MarketQuality:
      type: object
      required: [spreadOk, quoteFresh, liquidityOk, notes]
      properties:
        spreadOk:
          type: ["boolean", "null"]
        quoteFresh:
          type: ["boolean", "null"]
        liquidityOk:
          type: ["boolean", "null"]
        notes:
          type: ["string", "null"]

    CopilotTrigger:
      type: object
      required: [name, category, detected]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [primary_edge, entry_refinement]
          description: "primary_edge | entry_refinement"
        detected:
          type: boolean
        detail:
          type: ["string", "null"]

    JournalEntry:
      type: object
      required: [id, mode, symbol, createdAt]
      properties:
        id:
          type: integer
        mode:
          type: string
          enum: [LIVE, REPLAY, RESEARCH]
          description: "LIVE | REPLAY | RESEARCH"
        symbol:
          type: string
        eventTimestamp:
          type: ["string", "null"]
        eventSnapshot:
          type: ["object", "null"]
          additionalProperties: true
        manualOutcome:
          type: ["object", "null"]
          additionalProperties: true
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    JournalEntryInput:
      type: object
      required: [mode, symbol]
      properties:
        mode:
          type: string
          enum: [LIVE, REPLAY, RESEARCH]
          description: "LIVE | REPLAY | RESEARCH"
        symbol:
          type: string
        eventTimestamp:
          type: string
        eventSnapshot:
          type: object
          additionalProperties: true
        manualOutcome:
          type: object
          additionalProperties: true
        notes:
          type: string

    StrategyRegistryEntry:
      type: object
      required:
        - id
        - hypothesisName
        - primaryEdgeType
        - minimumSampleCount
        - validationStatus
        - definition
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        hypothesisName:
          type: string
        primaryEdgeType:
          type: string
        universe:
          type: ["string", "null"]
        holdingPeriod:
          type: ["string", "null"]
        minimumSampleCount:
          type: integer
        validationStatus:
          type: string
          enum:
            - unproven
            - paper_pending
            - backtested_only
            - backtested_pending_forward
            - paper_validated
            - no_edge
            - insufficient_sample
        definition:
          type: object
          additionalProperties: true
        createdAt:
          type: string
        updatedAt:
          type: string

    ValidationState:
      type: object
      required: [id, strategyName, validationStatus, sampleCount, metrics, updatedAt]
      properties:
        id:
          type: integer
        strategyName:
          type: string
        validationStatus:
          type: string
          enum:
            - unproven
            - paper_pending
            - backtested_only
            - backtested_pending_forward
            - paper_validated
            - no_edge
            - insufficient_sample
        sampleCount:
          type: integer
        metrics:
          type: object
          additionalProperties: true
        updatedAt:
          type: string

    HistoryEvent:
      type: object
      required: [id, mode, eventSnapshot, createdAt]
      properties:
        id:
          type: integer
        eventId:
          type: ["string", "null"]
        symbol:
          type: ["string", "null"]
        mode:
          type: string
          enum: [LIVE, REPLAY, RESEARCH]
        alertLevel:
          type: ["string", "null"]
          enum: ["L1", "L2", "L3", "L4", "L5", null]
        eventSnapshot:
          $ref: "#/components/schemas/CopilotEvent"
        createdAt:
          type: string
