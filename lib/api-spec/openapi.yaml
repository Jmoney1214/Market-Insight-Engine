openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinDesk AI Analyst API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Ticker analysis and reports
  - name: watchlist
    description: Watchlist management
  - name: scan
    description: Market scanning
  - name: copilot
    description: Trading Desk Copilot research helper (no order execution)

paths:
  /scan/premarket:
    get:
      operationId: getPremarketScan
      tags: [scan]
      summary: Morning market scan
      description: >
        Scans a liquid under-$150 universe for the day's best intraday candidates
        and the largest gappers up/down, ranked by gap, volatility, liquidity and
        catalysts (earnings, analyst grade changes, news). Evidence-ranked, not a
        prediction guarantee.
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
          description: Bypass the short-lived scan cache
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "503":
          description: Market data providers not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /scan/scorecard:
    get:
      operationId: getScanScorecard
      tags: [scan]
      summary: Scan accountability scorecard
      description: >
        Measured hit rates for past scan picks: each morning's picks are recorded,
        then graded after the close against the session's actual bar
        (intraday = ranged >=2%, jump = closed up, fall = closed down).
      responses:
        "200":
          description: Scorecard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorecardSummary"

  /scan/universe-snapshot:
    get:
      operationId: getUniverseSnapshot
      tags: [scan]
      summary: Screener universe as of a past trading day
      description: >
        The scan records its screener constituents once per trading morning.
        Point-in-time backtests read this to replay past dates against the TRUE
        as-of universe (survivorship-bias fix). 404 for dates before the
        feature shipped or non-trading days.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Trading date (YYYY-MM-DD, America/New_York)
      responses:
        "200":
          description: Universe snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniverseSnapshot"
        "400":
          description: Missing or malformed date parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No snapshot recorded for that date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyze:
    post:
      operationId: analyzeTicker
      tags: [analysis]
      summary: Run AI analysis on a ticker
      description: Triggers a full analyst report for the given ticker using live market data and AI-generated analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Invalid ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /reports:
    get:
      operationId: listReports
      tags: [analysis]
      summary: List past analyses
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummary"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [analysis]
      summary: Get a specific report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteReport
      tags: [analysis]
      summary: Delete a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get watchlist tickers
      responses:
        "200":
          description: Watchlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistEntry"
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add ticker to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntry"

  /watchlist/{ticker}:
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove ticker from watchlist
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /copilot/healthz:
    get:
      operationId: copilotHealthCheck
      tags: [copilot]
      summary: Copilot service health check
      description: Returns health status for the Trading Desk Copilot service
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotHealth"

  /copilot/event:
    get:
      operationId: getCopilotEvent
      tags: [copilot]
      summary: Build the canonical deterministic copilot event for a symbol
      description: >-
        Computes one deterministic copilot event from bars/quote. Research and
        helper only: never returns order intent or any execution signal.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [fixture, yahoo_delayed, alpaca_live]
            default: fixture
          description: "Data source; fixtures require no API keys; alpaca_live requires Alpaca API keys. yahoo_delayed is disabled by the data-plane contract (400) unless ALLOW_DELAYED_YAHOO=true."
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [LIVE, REPLAY, RESEARCH]
      responses:
        "200":
          description: Canonical copilot event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotEvent"
        "404":
          description: Unknown fixture symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/explain:
    get:
      operationId: explainCopilotEvent
      tags: [copilot]
      summary: Explain a deterministic copilot event with the read-only analyst committee
      description: >-
        Runs the multi-agent analyst committee over the deterministic copilot
        event for a symbol. The committee only explains, critiques, and
        summarizes the deterministic read: it never creates signals, approves
        trades, overrides hard blocks, or invents data. When the event is
        hard-blocked the recommendation can only be a defensive value.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [fixture, yahoo_delayed, alpaca_live]
            default: fixture
          description: "Data source; fixtures require no API keys; alpaca_live requires Alpaca API keys. yahoo_delayed is disabled by the data-plane contract (400) unless ALLOW_DELAYED_YAHOO=true."
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [LIVE, REPLAY, RESEARCH]
      responses:
        "200":
          description: Read-only analyst committee explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteeRead"
        "404":
          description: Unknown fixture symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/journal:
    get:
      operationId: listJournalEntries
      tags: [copilot]
      summary: List journal entries
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [copilot]
      summary: Create a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/journal/{id}:
    delete:
      operationId: deleteJournalEntry
      tags: [copilot]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /copilot/strategies:
    get:
      operationId: listStrategies
      tags: [copilot]
      summary: List strategy registry entries
      responses:
        "200":
          description: Strategy registry entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyRegistryEntry"

  /copilot/validation:
    get:
      operationId: listValidationStates
      tags: [copilot]
      summary: "Deprecated: strategy validation states (projection of the edge scoreboard)"
      description: >-
        Compatibility adapter that projects the deterministic edge scoreboard into
        the legacy validation-state shape. Prefer GET /copilot/scoreboard.
      responses:
        "200":
          description: Validation states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationState"

  /copilot/scoreboard:
    get:
      operationId: getScoreboard
      tags: [copilot]
      summary: Deterministic edge scoreboard computed from journaled outcomes
      responses:
        "200":
          description: Edge scores, one row per primary-edge hypothesis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EdgeScore"

  /copilot/history:
    get:
      operationId: listHistoryEvents
      tags: [copilot]
      summary: List historical copilot events
      responses:
        "200":
          description: History events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEvent"

  /copilot/replay/session:
    get:
      operationId: getReplaySession
      tags: [copilot]
      summary: Load replay session metadata for a symbol/date
      description: >-
        Returns metadata for a fixture-backed replay session (total steps, bar
        interval, session bounds). Research/practice only: replay never executes,
        simulates, routes, or paper-trades. Real paid historical feeds are out of
        scope (adapter hooks only).
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
          description: "ISO date (YYYY-MM-DD); defaults to the symbol's available session"
      responses:
        "200":
          description: Replay session metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplaySession"
        "404":
          description: No replayable session for this symbol/date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/replay/event:
    get:
      operationId: getReplayEvent
      tags: [copilot]
      summary: Build the deterministic copilot event at a replay step
      description: >-
        Computes one deterministic copilot event for a single replay step by
        replaying bars[0..step] through the SAME pipeline used for live reads.
        Returns the canonical CopilotEvent shape with mode REPLAY. Never returns
        order intent or any execution signal.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: "ISO date (YYYY-MM-DD) of the replay session"
        - name: step
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
          description: "0-based replay step (0 .. totalSteps-1)"
      responses:
        "200":
          description: Canonical copilot event for the replay step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotEvent"
        "404":
          description: Invalid replay symbol/date/step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /copilot/replay/explain:
    get:
      operationId: explainReplayEvent
      tags: [copilot]
      summary: Explain the replay-step event with the read-only analyst committee
      description: >-
        Runs the same multi-agent analyst committee over the deterministic
        replay-step event. The committee only explains, critiques, and
        summarizes: it never creates signals, approves trades, overrides hard
        blocks, or invents data.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: step
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Read-only analyst committee explanation for the replay step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteeRead"
        "404":
          description: Invalid replay symbol/date/step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    ReplaySession:
      type: object
      description: Fixture-backed replay session metadata. Research/practice only; never executes, simulates, or paper-trades.
      required:
        - symbol
        - date
        - availableDates
        - dataSource
        - totalSteps
        - barSeconds
        - startTime
        - endTime
      properties:
        symbol:
          type: string
        date:
          type: string
          description: "ISO date (YYYY-MM-DD) of the replayable session"
        availableDates:
          type: array
          items:
            type: string
          description: "Every ISO date this symbol can be replayed for (for the date picker)"
        dataSource:
          type: string
        totalSteps:
          type: integer
          description: "Valid replay steps are 0-based: 0 .. totalSteps-1"
        barSeconds:
          type: integer
        startTime:
          type: integer
          description: "Epoch seconds of the first bar"
        endTime:
          type: integer
          description: "Epoch seconds of the last bar"
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnalyzeInput:
      type: object
      required: [ticker]
      properties:
        ticker:
          type: string
          description: Stock ticker symbol (e.g. AAPL, NVDA)

    ReportSummary:
      type: object
      required: [id, ticker, companyName, sector, generatedAt, overallRating]
      properties:
        id:
          type: integer
        ticker:
          type: string
        companyName:
          type: string
        sector:
          type: string
        generatedAt:
          type: string
        overallRating:
          type: string
          description: "BUY | HOLD | SELL | WATCH"

    Report:
      type: object
      required: [id, ticker, companyName, sector, industry, generatedAt, snapshot, catalysts, news, filings, financials, valuation, technical, risks, thesis, actionPlan, overallRating, disclaimer]
      properties:
        id:
          type: integer
        ticker:
          type: string
        companyName:
          type: string
        sector:
          type: string
        industry:
          type: string
        generatedAt:
          type: string
        overallRating:
          type: string
          description: "BUY | HOLD | SELL | WATCH"
        disclaimer:
          type: string
        snapshot:
          $ref: "#/components/schemas/CompanySnapshot"
        catalysts:
          $ref: "#/components/schemas/CatalystSummary"
        news:
          $ref: "#/components/schemas/NewsSummary"
        filings:
          $ref: "#/components/schemas/FilingsSummary"
        financials:
          $ref: "#/components/schemas/FinancialOverview"
        valuation:
          $ref: "#/components/schemas/ValuationFramework"
        technical:
          $ref: "#/components/schemas/TechnicalTrend"
        risks:
          $ref: "#/components/schemas/RiskChecklist"
        thesis:
          $ref: "#/components/schemas/Thesis"
        actionPlan:
          $ref: "#/components/schemas/ActionPlan"
        fundamentals:
          $ref: "#/components/schemas/Fundamentals"
        todaySetup:
          $ref: "#/components/schemas/TodaySetup"

    TodaySetup:
      type: object
      description: "Intraday context for the current/most-recent session (Alpaca SIP + catalysts). The 'trade today' half of the report."
      required: [isPlaceholder, gapPct, prevClose]
      properties:
        isPlaceholder:
          type: boolean
        gapPct:
          type: number
          description: "% vs last completed session close (pre/post-market aware)"
        prevClose:
          type: number
        sessionOpen:
          type: ["number", "null"]
        sessionHigh:
          type: ["number", "null"]
        sessionLow:
          type: ["number", "null"]
        sessionVwap:
          type: ["number", "null"]
        rvol:
          type: ["number", "null"]
          description: Session volume vs 20-day average (only when a live session is underway)
        atrPct:
          type: ["number", "null"]
        expectedRangeLow:
          type: ["number", "null"]
          description: price - 1 ATR
        expectedRangeHigh:
          type: ["number", "null"]
          description: price + 1 ATR
        earningsToday:
          type: boolean
        gradeChange:
          type: ["string", "null"]
          description: Recent analyst action, e.g. "Upgraded to Overweight by Morgan Stanley (2026-07-02)"
        avgDailyRangePct:
          type: ["number", "null"]
          description: Average (high-low)/close % over the last 10 sessions
        multiTradeDays:
          type: ["number", "null"]
          description: Sessions out of the last 10 that ranged >=2%

    Fundamentals:
      type: object
      description: "Rich fundamentals data (FMP). Present when a fundamentals key is configured."
      required: [isPlaceholder]
      properties:
        isPlaceholder:
          type: boolean
        fiscalYear:
          type: ["string", "null"]
        totalAssets:
          type: ["number", "null"]
        totalDebt:
          type: ["number", "null"]
        netDebt:
          type: ["number", "null"]
        cashAndShortTermInvestments:
          type: ["number", "null"]
        totalEquity:
          type: ["number", "null"]
        operatingCashFlow:
          type: ["number", "null"]
        capitalExpenditure:
          type: ["number", "null"]
        freeCashFlow:
          type: ["number", "null"]
        dividendsPaid:
          type: ["number", "null"]
        stockBuybacks:
          type: ["number", "null"]
        ratingConsensus:
          type: ["string", "null"]
        ratingStrongBuy:
          type: ["number", "null"]
        ratingBuy:
          type: ["number", "null"]
        ratingHold:
          type: ["number", "null"]
        ratingSell:
          type: ["number", "null"]
        ratingStrongSell:
          type: ["number", "null"]
        estimateFiscalYear:
          type: ["string", "null"]
        estimatedRevenueAvg:
          type: ["number", "null"]
        estimatedEpsAvg:
          type: ["number", "null"]

    ScanResult:
      type: object
      required: [generatedAt, universeSize, priceCeiling, topIntraday, likelyJump, likelyFall, note]
      properties:
        generatedAt:
          type: string
        universeSize:
          type: integer
        priceCeiling:
          type: number
        note:
          type: string
          description: Honest framing of what the scan is (evidence ranking, not prophecy)
        topIntraday:
          type: array
          items:
            $ref: "#/components/schemas/ScanCandidate"
        likelyJump:
          type: array
          items:
            $ref: "#/components/schemas/ScanCandidate"
        likelyFall:
          type: array
          items:
            $ref: "#/components/schemas/ScanCandidate"

    ScorecardSummary:
      type: object
      required: [asOf, lists, recent]
      properties:
        asOf:
          type: string
        lists:
          type: array
          items:
            $ref: "#/components/schemas/ScorecardListStats"
        recent:
          type: array
          items:
            $ref: "#/components/schemas/ScorecardEntry"

    ScorecardListStats:
      type: object
      required: [list, graded, hits, hitRate]
      properties:
        list:
          type: string
          description: "intraday | jump | fall"
        graded:
          type: integer
        hits:
          type: integer
        hitRate:
          type: number
          description: percent of graded picks that hit

    ScorecardEntry:
      type: object
      required: [scanDate, symbol, list, score, gapPct, priceAtScan]
      properties:
        scanDate:
          type: string
        symbol:
          type: string
        list:
          type: string
        score:
          type: number
        gapPct:
          type: number
        priceAtScan:
          type: number
        changePct:
          type: ["number", "null"]
        rangePct:
          type: ["number", "null"]
        hit:
          type: ["boolean", "null"]

    ScanCandidate:
      type: object
      required: [symbol, price, gapPct, score, reasons]
      properties:
        symbol:
          type: string
        companyName:
          type: ["string", "null"]
        price:
          type: number
        gapPct:
          type: number
          description: "% vs last completed session close (pre/post-market aware)"
        avgVolume:
          type: ["number", "null"]
        atrPct:
          type: ["number", "null"]
          description: 14-day ATR as % of price (intraday range potential)
        rsi:
          type: ["number", "null"]
        avgDailyRangePct:
          type: ["number", "null"]
          description: Average (high-low)/close % over the last 10 sessions
        multiTradeDays:
          type: ["number", "null"]
          description: Sessions out of the last 10 that ranged >=2% — the "multiple trades today" signal
        score:
          type: number
          description: 0-100 composite (repeatable range, liquidity, gap, catalysts)
        tradeClass:
          type: ["string", "null"]
          enum: [rider, scalper, caution, avoid, null]
          description: >-
            Backtest-validated stock class (research/findings.md case study 3):
            rider = hyper-volatile mover (avg range >= ~6.5%/day, >= $20) — ride the day;
            scalper = liquid large cap (>= ~$8B/day dollar volume) — take profit targets;
            caution = mid-range or cheap mover — edge unreliable;
            avoid = quiet tape — no validated intraday edge.
        classNote:
          type: ["string", "null"]
          description: One-line human explanation of the assigned tradeClass
        reasons:
          type: array
          items:
            type: string

    UniverseSnapshot:
      type: object
      required: [date, count, symbols]
      properties:
        date:
          type: string
        count:
          type: number
        symbols:
          type: array
          items:
            type: object
            required: [symbol]
            properties:
              symbol:
                type: string
              companyName:
                type: ["string", "null"]
              price:
                type: ["number", "null"]
              avgVolume:
                type: ["number", "null"]

    CompanySnapshot:
      type: object
      required: [description, marketCap, price, change1d, change52w, peRatio, eps, revenue, employees, headquarters, founded, exchange]
      properties:
        description:
          type: string
        marketCap:
          type: string
        price:
          type: number
        change1d:
          type: number
        change52w:
          type: number
        peRatio:
          type: ["number", "null"]
        eps:
          type: ["number", "null"]
        revenue:
          type: string
        employees:
          type: string
        headquarters:
          type: string
        founded:
          type: string
        exchange:
          type: string

    CatalystSummary:
      type: object
      required: [positive, negative, upcoming]
      properties:
        positive:
          type: array
          items:
            type: string
        negative:
          type: array
          items:
            type: string
        upcoming:
          type: array
          items:
