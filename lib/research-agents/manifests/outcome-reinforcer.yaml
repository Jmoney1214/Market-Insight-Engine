id: outcome-reinforcer
version: 1.0.0
description: FinMem feedback loop, bounded. Graded outcomes adjust memory importance by at most 15 points per event, idempotent per grade reference. Promotion into the semantic layer requires schema validity plus an independent grade - importance tuning can never mint trusted truth by itself.
category: memory
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - memory.read
  - memory.reinforce
  - grades.read
read_scopes: ["memory_items:all", "finding_grades:recent"]
write_scopes: ["memory_items:importance_and_promotion"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 50
  maximum_seconds: 60
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/memory.test.ts
deterministic_guards: ["delta_bounded_per_event", "idempotent_per_grade_ref", "promotion_requires_independent_grade", "content_never_rewritten"]
memory_policy: gated_cross_run
