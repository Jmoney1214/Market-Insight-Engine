id: macro-context-analyst
version: 1.0.0
description: Deterministic macro trigger router and context builder. Calendar release windows and index-move thresholds decide whether macro context is required — the model never decides to run. Vintage-aware; values are never blended across revisions.
category: research
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - macro.get_calendar
  - market.get_index_move
read_scopes: ["macro_calendar:recent", "market_data:current"]
write_scopes: ["macro_context:append"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 10
  maximum_seconds: 60
  maximum_cost_usd: 0
failure_mode: RETURN_NOT_REQUIRED
eval_suite: lib/research-agents/src/macro.test.ts
deterministic_guards: ["trigger_router_is_code", "vintage_selection_never_blends", "not_triggered_returns_not_required"]
memory_policy: current_run_only
