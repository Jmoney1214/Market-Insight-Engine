id: tiered-memory-store
version: 1.0.0
description: FinMem four-layer memory store (working/episodic/semantic/performance) with per-layer expiry and decay. Semantic is promotion-gated — schema validity plus an independent grade reference are required; no agent write path exists into the trusted layer.
category: memory
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - memory.record
  - memory.read
read_scopes: ["memory_items:all"]
write_scopes: ["memory_items:append_nonsemantic"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 20
  maximum_seconds: 30
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/memory.test.ts
deterministic_guards: ["semantic_layer_promotion_gated", "per_layer_expiry_enforced", "direct_semantic_write_refused"]
memory_policy: gated_cross_run
