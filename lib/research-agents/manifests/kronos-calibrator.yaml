id: kronos-calibrator
version: 1.0.0
description: Quant-research calibration gate. Every forecast is graded against the realized session close after its window (direction hit + Brier); the rolling report (samples, Brier, hit rate, p_up reliability deciles) gates the Desk - Kronos renders ONLY while calibration passes. The gate is code, not a preference. Flat or unknown realizations stay ungraded, never guessed.
category: forecast
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - kronos.read_forecasts
  - kronos.write_grades
  - market.get_session_bar
read_scopes: ["kronos_forecasts:pending", "market_data:session_bars"]
write_scopes: ["kronos_forecasts:grading_columns"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 60
  maximum_seconds: 120
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/kronosCalibration.test.ts
deterministic_guards: ["desk_gated_until_calibration_passes", "brier_and_hit_thresholds_in_code", "flat_moves_never_graded"]
memory_policy: current_run_only
