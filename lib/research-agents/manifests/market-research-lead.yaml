id: market-research-lead
version: 1.0.0
description: Manager-pattern lead. Proposes a ResearchPlan (validated by deterministic code), invokes specialists as typed tools, assembles the CandidatePacket from specialist outputs only — it cannot author a research field itself.
category: research
model_policy:
  tier: deep
  structured_output: true
allowed_tools:
  - catalyst.verify
  - catalyst.second_verify
  - source.audit
  - sentiment.read
  - macro.context
  - capital.structure
read_scopes: ["candidate_seed:current", "agent_output:current_run"]
write_scopes: ["candidate_packet:append", "dependency_manifest:append"]
budgets:
  maximum_model_calls: 3
  maximum_tool_calls: 12
  maximum_seconds: 300
  maximum_cost_usd: 0.50
failure_mode: RETURN_PARTIAL_OR_BLOCKED
eval_suite: lib/research-agents/src/lead.test.ts
deterministic_guards: ["plan_validated_before_execution", "packet_fields_from_specialists_only", "dependency_manifest_sorted_and_hashed"]
memory_policy: current_run_only
