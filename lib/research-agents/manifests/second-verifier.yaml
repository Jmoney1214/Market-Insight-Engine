id: second-verifier
version: 1.0.0
description: ContestTrade dual-verification. Independently re-verifies the catalyst on a different model backbone; a deterministic resolver passes agreements and emits Conflict records for disagreements — values are never averaged.
category: research
model_policy:
  tier: deep
  structured_output: true
allowed_tools:
  - sec.get_submissions
  - sec.get_filing_document
  - news.get_clusters
read_scopes: ["candidate_seed:current", "source_document:current_run", "news_events:recent"]
write_scopes: ["catalyst_record:append", "conflict:append"]
budgets:
  maximum_model_calls: 2
  maximum_tool_calls: 20
  maximum_seconds: 180
  maximum_cost_usd: 0.25
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/contest.test.ts
deterministic_guards: ["independent_run_required", "conflicts_never_averaged", "disagreement_marks_conflicted"]
memory_policy: current_run_only
