id: event-study-grader
version: 1.0.0
description: ai-hedge-fund CAR engine. Market-model abnormal returns vs SPY with a t-test grade every research catalyst after its event window - did the catalyst move the stock beyond noise, measured, never eyeballed. Unestimable windows stay ungraded rather than guessed.
category: grading
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - market.get_daily_bars
  - grades.read
  - grades.write_event_study
read_scopes: ["finding_grades:pending_event_study", "research_objects:catalyst_records", "market_data:daily_bars"]
write_scopes: ["finding_grades:event_study_columns"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 60
  maximum_seconds: 120
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/eventStudy.test.ts
deterministic_guards: ["market_model_ols_by_code", "significance_via_t_test", "thin_history_never_graded", "benchmark_is_spy"]
memory_policy: current_run_only
