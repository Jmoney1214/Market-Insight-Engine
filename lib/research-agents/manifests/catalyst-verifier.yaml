id: catalyst-verifier
version: 1.0.0
description: Answers the nine catalyst questions over pre-fetched SEC and news evidence. The model only narrates description and event type; entity match, staleness, primary-source presence and the final VerificationStatus are decided by deterministic code.
category: research
model_policy:
  tier: deep
  structured_output: true
allowed_tools:
  - sec.get_submissions
  - sec.get_filing_document
  - news.get_clusters
read_scopes: ["candidate_seed:current", "source_document:current_run", "news_events:recent"]
write_scopes: ["catalyst_record:append", "claim:append"]
budgets:
  maximum_model_calls: 2
  maximum_tool_calls: 20
  maximum_seconds: 180
  maximum_cost_usd: 0.25
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/catalystVerifier.test.ts
deterministic_guards: ["verification_status_decided_by_code", "narrator_output_strictly_parsed", "no_evidence_means_unknown"]
memory_policy: current_run_only
