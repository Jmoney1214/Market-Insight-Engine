id: agent-accuracy-ranker
version: 1.0.0
description: ContestTrade predict-then-top-k over the unified grade ledger. Rolling source-faithfulness, false-catalyst rate, and Brier calibration per research agent - ranked by accuracy, never profitability; no PnL input exists. Agents under the minimum sample count are unranked, never extrapolated.
category: grading
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - grades.read
  - research_objects.read
read_scopes: ["finding_grades:rolling_window", "research_objects:catalysts_and_audits"]
write_scopes: []
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 10
  maximum_seconds: 30
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/research-agents/src/accuracyRanker.test.ts
deterministic_guards: ["accuracy_never_profitability", "min_samples_to_rank", "missing_data_narrows_basis_never_scores"]
memory_policy: current_run_only
