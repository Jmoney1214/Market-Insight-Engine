id: slippage-analyzer
version: 1.0.0
description: Post-trade comparison of journal fills against the expected-cost model; persists per-trade slippage.
category: grading
model_policy:
  tier: none
  structured_output: false
allowed_tools:
  - journal.read
read_scopes: ["journal:read", "cost_annotation:read"]
write_scopes: ["slippage:append"]
budgets:
  maximum_model_calls: 0
  maximum_tool_calls: 10
  maximum_seconds: 30
  maximum_cost_usd: 0
failure_mode: RETURN_UNKNOWN
eval_suite: lib/copilot-core/src/costModel.test.ts
deterministic_guards: ["pure_math_no_llm", "measured_edge_inputs_manual_confirmed_only"]
memory_policy: current_run_only
